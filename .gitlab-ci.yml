---
# See https://docs.gitlab.com/ee/ci/yaml/README.html

variables:
    CHANGESET_RELEASE_BRANCH: changeset-release/main
    PNPM_HOME: .pnpm

.with_pnpm:
    image: kucrut/pnpm:18
    interruptible: true
    cache:
        key:
            files:
                - pnpm-lock.yaml
        paths:
            - $PNPM_HOME

.base_release:
    extends: .with_pnpm
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          changes:
              - 'CHANGELOG.md'
          exists:
              - 'CHANGELOG.md'

stages:
    - lint
    - build
    - pre-release
    - release
    - deploy

enable_merge:
    image: alpine:latest
    interruptible: true
    stage: lint
    rules:
        - if: $CI_MERGE_REQUEST_ID
    script: echo true

lint:
    extends: .with_pnpm
    script: pnpm install --silent && pnpm lint
    stage: lint
    rules:
        - if: $CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != $CHANGESET_RELEASE_BRANCH
          changes:
              - '**/*.cjs'
              - '**/*.html'
              - '**/*.js'
              - '**/*.svelte'
              - '**/*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'

build_merge_request:
    extends: .with_pnpm
    stage: build
    script:
        - pnpm install --silent
        - pnpm build
    rules:
        - if: $CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != $CHANGESET_RELEASE_BRANCH
          changes:
              - '.gitlab-ci.yml'
              - '**/*.cjs'
              - '**/*.css'
              - '**/*.html'
              - '**/*.js'
              - '**/*.svelte'
              - '**/*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'

create_release_mr:
    extends: .with_pnpm
    stage: pre-release
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          exists:
              - '.changeset/*.md'
          changes:
              - '.changeset/**'
        - if: $CI_COMMIT_TAG
          when: never
    script: |
        pnpm install --silent
        pnpx changesets-gitlab
    variables:
        INPUT_COMMIT: New version
        INPUT_TITLE: New version

release:
    stage: release
    extends: .base_release
    artifacts:
        paths:
            - build
    variables:
        VITE_BASE: '/${CI_PROJECT_NAME}'
    script: |
        cat << EOF > "$HOME/.npmrc"
            //registry.npmjs.org/:_authToken=$NPM_TOKEN
        EOF
        pnpm install --silent
        pnpm build
        pnpm publish package --access public --no-git-checks

pages:
    extends: .base_release
    stage: deploy
    script: mv build public
    artifacts:
        paths:
            - public
    needs:
        - job: release
          artifacts: true
