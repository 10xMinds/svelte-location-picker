---
# See https://docs.gitlab.com/ee/ci/yaml/README.html

.with_node:
    image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:18-alpine
    cache:
        key: ${CI_COMMIT_REF_SLUG}
        paths:
            - .pnpm-store
    before_script:
        - npm i --location=global pnpm
        - pnpm config set store-dir .pnpm-store

.base_build:
    extends: .with_node
    stage: build
    script:
        - pnpm install
        - pnpm build

.base_publish:
    extends: .with_node
    stage: publish
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          changes:
              - 'CHANGELOG.md'
        - if: $CI_COMMIT_TAG
          when: never

stages:
    - lint
    - build
    - publish

enable_merge:
    image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:latest
    stage: lint
    rules:
        - if: $CI_MERGE_REQUEST_ID
    script: echo true

lint:
    extends: .with_node
    script: pnpm install && pnpm lint && pnpm check
    stage: lint
    rules:
        - if: $CI_MERGE_REQUEST_ID
          changes:
              - '**/*.cjs'
              - '**/*.html'
              - '**/*.js'
              - '**/*.svelte'
              - '**/*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'

build_merge_request:
    extends: .base_build
    rules:
        - if: $CI_MERGE_REQUEST_ID
          changes:
              - '.gitlab-ci.yml'
              - '**/*.cjs'
              - '**/*.css'
              - '**/*.html'
              - '**/*.js'
              - '**/*.svelte'
              - '**/*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'

build_main:
    extends: .base_build
    artifacts:
        paths:
            - build
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
    script: mv build public
    stage: publish
    artifacts:
        paths:
            - public
    needs:
        - job: build_main
          artifacts: true
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
